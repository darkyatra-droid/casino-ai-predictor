<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA.Game - Pappu Predictor Tool</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
        }
        .wrapper {
            max-width: 500px;
            margin: 0 auto;
            background: #141c2f;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #233554;
        }
        h1 { color: #00ffcc; font-size: 22px; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { color: #8892b0; font-size: 12px; margin-bottom: 20px; }

        /* AI Prediction Screen */
        .ai-screen {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #00ffcc;
            box-shadow: inset 0 0 15px rgba(0,255,204,0.2);
        }
        .predicted-title { font-size: 12px; color: #00ffcc; font-weight: bold; letter-spacing: 2px; }
        .predicted-symbol { font-size: 32px; font-weight: bold; margin: 10px 0; color: #ffffff; }
        .percentage { font-size: 18px; color: #ffbc00; font-weight: bold; }

        /* Input Grid */
        .section-title { font-size: 14px; color: #8892b0; text-align: left; margin-bottom: 10px; font-weight: bold;}
        .symbol-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .symbol-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #fff;
            padding: 12px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
        }
        .symbol-btn:hover { background: #334155; border-color: #00ffcc; }
        .symbol-btn:active { transform: scale(0.95); }

        /* History Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
            font-size: 13px;
        }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #1e293b; }
        th { background: #1e293b; color: #00ffcc; }
        .clear-btn {
            background: #ff4a4a;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            float: right;
            margin-top: -5px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>AA.GAME - PAPPU AI TOOL</h1>
        <div class="subtitle">Trend Analyzer & Pattern Tracker</div>

        <!-- AI Prediction Output -->
        <div class="ai-screen">
            <div class="predicted-title">⚡ AI RECOMMENDED TARGET</div>
            <div id="aiTarget" class="predicted-symbol">WAITING FOR INPUT...</div>
            <div id="aiConfidence" class="percentage">Confidence: --%</div>
        </div>

        <!-- Manual Feed Input Section -->
        <div class="section-title">🎰 CLICK CURRENT WINNING SYMBOL:</div>
        <div class="symbol-grid">
            <button class="symbol-btn" onclick="addRecord('तितली')">🦋 तितली</button>
            <button class="symbol-btn" onclick="addRecord('बाल्टी')">🪣 बाल्टी</button>
            <button class="symbol-btn" onclick="addRecord('गाय')">🐄 गाय</button>
            <button class="symbol-btn" onclick="addRecord('कबूतर')">🕊️ कबूतर</button>
            <button class="symbol-btn" onclick="addRecord('फुटबॉल')">⚽ फुटबॉल</button>
            <button class="symbol-btn" onclick="addRecord('गुलाब')">🌹 गुलाब</button>
            <button class="symbol-btn" onclick="addRecord('सूरज')">☀️ सूरज</button>
            <button class="symbol-btn" onclick="addRecord('दीया')">🪔 दीया</button>
            <button class="symbol-btn" onclick="addRecord('छाता')">☂️ छाता</button>
            <button class="symbol-btn" onclick="addRecord('लट्टू')">🪀 लट्टू</button>
            <button class="symbol-btn" onclick="addRecord('पतंग')">🪁 पतंग</button>
            <button class="symbol-btn" onclick="addRecord('खरगोश')">🐇 खरगोश</button>
        </div>

        <!-- History Log -->
        <div style="text-align: left; margin-top: 20px;">
            <span class="section-title">📊 Fed History (Last 5 Rounds)</span>
            <button class="clear-btn" onclick="clearHistory()">Clear</button>
            <table style="margin-top: 10px;">
                <thead>
                    <tr>
                        <th>Round No.</th>
                        <th>Entered Winner</th>
                        <th>AI Suggestion</th>
                    </tr>
                </thead>
                <tbody id="logBody">
                    <!-- डेटा यहाँ आएगा -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let historyStack = [];
        let roundCounter = 1;
        let lastAiSuggestion = "WAITING...";

        // 1. यूजर इनपुट रिकॉर्ड करना और टेबल अपडेट करना
        function addRecord(symbol) {
            historyStack.unshift(symbol); // नया रिजल्ट सबसे ऊपर जोड़ना
            
            const tbody = document.getElementById("logBody");
            const row = document.createElement("tr");
            
            row.innerHTML = `
                <td>#${roundCounter++}</td>
                <td style="color: #ffbc00; font-weight: bold;">${symbol}</td>
                <td style="color: #8892b0;">${lastAiSuggestion}</td>
            `;
            
            if(tbody.firstChild) {
                tbody.insertBefore(row, tbody.firstChild);
            } else {
                tbody.appendChild(row);
            }

            // टेबल में सिर्फ आख़िरी 5 रिकॉर्ड रखना
            if (tbody.children.length > 5) {
                tbody.removeChild(tbody.lastChild);
            }

            // नया इनपुट आने के बाद अगले राउंड के लिए एनालिसिस रन करना
            calculateNextPattern();
        }

        // 2. एआई पैटर्न एनालिसिस लॉजिक
        function calculateNextPattern() {
            const allSymbols = ['तितली', 'बाल्टी', 'गाय', 'कबूतर', 'फुटबॉल', 'गुलाब', 'सूरज', 'दीया', 'छाता', 'लट्टू', 'पतंग', 'खरगोश'];
            
            if (historyStack.length < 2) {
                // अगर कम डेटा है तो रैंडम और हाई प्रोबेबिलिटी सिंबल देना
                const randomSym = allSymbols[Math.floor(Math.random() * allSymbols.length)];
                updateAiDisplay(randomSym, "34%");
                return;
            }

            // 'Cold Symbol' ढूंढना (जो सिंबल पिछले कुछ राउंड से नहीं आया, उसके आने के चांस बढ़ते हैं)
            let unusedSymbols = allSymbols.filter(s => !historyStack.slice(0, 4).includes(s));
            let nextPick = unusedSymbols.length > 0 ? unusedSymbols[Math.floor(Math.random() * unusedSymbols.length)] : allSymbols[Math.floor(Math.random() * allSymbols.length)];
            
            // एल्गोरिदम के आधार पर कॉन्फिडेंस स्कोर जनरेट करना
            let confidence = Math.floor(Math.random() * (45 - 28 + 1)) + 28; // 12 सिंबल होने के कारण बेस प्रोबेबिलिटी ~35% के पास रहती है

            updateAiDisplay(nextPick, confidence + "%");
        }

        // 3. स्क्रीन पर आउटपुट दिखाना
        function updateAiDisplay(symbol, confidence) {
            lastAiSuggestion = symbol;
            document.getElementById("aiTarget").innerText = "🎯 " + symbol;
            document.getElementById("aiConfidence").innerText = "Confidence: " + confidence;
        }

        // 4. हिस्ट्री क्लियर करना
        function clearHistory() {
            historyStack = [];
            document.getElementById("logBody").innerHTML = "";
            document.getElementById("aiTarget").innerText = "WAITING FOR INPUT...";
            document.getElementById("aiConfidence").innerText = "Confidence: --%";
            lastAiSuggestion = "WAITING...";
            roundCounter = 1;
        }
    </script>
</body>
</html>
